name: Build Unsigned iOS App

on:
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Select Xcode
        # app.json ships an Icon Composer asset (assets/expo.icon), which needs
        # a recent Xcode to compile. Pin to the newest stable on the runner.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods downloads
        # react-native-executorch and op-sqlite pull large prebuilt xcframeworks;
        # caching the pod download cache saves several minutes per run.
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods/repos
          key: ${{ runner.os }}-pods-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Generate iOS project (Expo Prebuild)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Resolve Xcode scheme
        id: scheme
        # Expo names the workspace after `expo.name` in app.json (Alamara ->
        # Alamara.xcworkspace). Derive it so a rename doesn't break the build.
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"

      - name: Build Unsigned Archive
        run: |
          xcodebuild \
            -workspace "${{ steps.scheme.outputs.workspace }}" \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/unsigned.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            archive

      - name: Package into .ipa
        run: |
          APP=$(ls -d build/unsigned.xcarchive/Products/Applications/*.app | head -n 1)
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr Alamara-unsigned.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alamara-ios-unsigned
          path: Alamara-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
